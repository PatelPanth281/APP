  #       - asset: assets/fonts/NotoSerifDevanagari-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/NotoSerifDevanagari-Bold.ttf
  #         weight: 700
  #   - family: NotoSerif
  #     fonts:
  #       - asset: assets/fonts/NotoSerif-Regular.ttf
  #       - asset: assets/fonts/NotoSerif-Italic.ttf
  #         style: italic
  #       - asset: assets/fonts/NotoSerif-Medium.ttf
