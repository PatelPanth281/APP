name: shrimadbhagvadgeeta
description: "Shrimad Bhagavad Gita — A sacred reading companion built with Clean Architecture, Riverpod, and Hive."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── State Management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Local Storage (Offline-First) ─────────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Networking ────────────────────────────────────────────────────────────
  dio: ^5.4.3

  # ── Data Models ───────────────────────────────────────────────────────────
  freezed_annotation: ^2.4.2
  json_annotation: ^4.9.0

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^14.2.0

  # ── Utilities ─────────────────────────────────────────────────────────────
  equatable: ^2.0.5
  supabase_flutter: ^2.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # ── Code Generation ───────────────────────────────────────────────────────
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    # Font files are bundled here after running: powershell -File scripts/download_fonts.ps1
    - assets/fonts/

  # ── FONTS: Uncomment after running scripts/download_fonts.ps1 ─────────────
  # Run the script, then uncomment below and run: flutter pub get
